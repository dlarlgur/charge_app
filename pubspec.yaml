name: charge_helper
description: 주유/충전 도우미 - 주유소 + 전기차 충전소 통합 앱
publish_to: 'none'
version: 1.0.9+10

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0

  # HTTP
  dio: ^5.4.0

  # Image (network 이미지를 디스크에 캐싱 — 두 번째부터 즉시 표시)
  cached_network_image: ^3.4.1

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Location
  geolocator: ^12.0.0

  # Navigation
  go_router: ^14.0.0

  # UI
  flutter_svg: ^2.0.9
  shimmer: ^3.0.0
  flutter_markdown: ^0.7.4
  flutter_html: ^3.0.0-beta.2
  fl_chart: ^0.70.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.0
  permission_handler: ^11.0.0
  in_app_update: ^4.2.3

  # Map
  flutter_naver_map: ^1.2.0

  # Kakao Navi SDK
  kakao_flutter_sdk_navi: ^1.9.0

  # Social Login (카카오/네이버/구글) + 토큰 보관
  kakao_flutter_sdk_user: ^1.9.0
  flutter_naver_login: ^2.1.1
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.2.2

  # Splash
  flutter_native_splash: ^2.3.10
  package_info_plus: ^9.0.0

  # Firebase & Push
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  flutter_local_notifications: ^19.4.0
  uuid: ^4.0.0

  # Home Widget & Background Tasks
  home_widget: ^0.6.0
  workmanager: ^0.9.0

  # AdMob
  google_mobile_ads: ^5.2.0

  # DKSW 통합 어드민 연동 SDK (상용은 git ref 로 고정)
  dksw_app_core:
    git:
      url: https://github.com/dlarlgur/dksw_app_core.git
      ref: v0.5.0
  dio_cache_interceptor: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#0C0E13"
  # 70% 축소 padding 적용본 — 시스템이 splash 화면에 더 작고 안정적으로 표시되도록
  image: "assets/halfNhalf_launcher.png"
  android: true
  ios: true

flutter_launcher_icons:
  android: true
  ios: true
  # adaptive icon 의 원형 마스크 안으로 들어가도록 70% padding 적용본 사용
  image_path: "assets/halfNhalf_launcher.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/halfNhalf_launcher.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/brands/
    - assets/ev_operators/
    - assets/connectors/
    - assets/nav/
    - assets/logo/oil/

  # Pretendard — 한글/영문 통일감을 위해 5단계 weight 번들 (안드로이드 기기간
  # 시스템 폰트 차이 제거). 합계 ~7.5MB.
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.otf
          weight: 800
